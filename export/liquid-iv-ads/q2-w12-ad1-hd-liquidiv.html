<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="../">
<title>Liquid I.V. — Ad1 Portrait 300×470</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="brands/hydration-depot.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#e7e9ec;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font-primary)}
  .ad{position:relative;width:300px;height:470px;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(16,32,46,.22);background:#305b7d}
  .hero{position:relative;flex:1;overflow:hidden;background:#eef3f8}
  .photo{position:absolute;inset:0;width:100%;height:100%;background-image:url('assets/imagery/hd/liquid-iv-lineup-sq.jpg');background-repeat:no-repeat;background-size:120%;background-position:center 30%}
  .tag{position:absolute;top:26px;left:50%;transform:translateX(-50%);z-index:3;font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:#305b7d;background:transparent;border:1.5px solid #305b7d;padding:6px 13px 5px;border-radius:5px;white-space:nowrap;line-height:1}
  .foot{flex:none;background:#305b7d;padding:22px 24px 24px;display:flex;flex-direction:column;gap:14px;align-items:center;text-align:center}
  .head{font-family:var(--font-condensed);text-transform:uppercase;line-height:1.0;color:#fff;margin:0;font-size:34px}
  .head span{display:block;font-weight:500}
  .head em{display:block;font-style:normal;font-weight:700}
  .cta{font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fff;background:var(--brand-cta);border:0;border-radius:8px;font-size:15px;padding:13px 24px;white-space:nowrap}
  @media (prefers-reduced-motion: no-preference){
    .tag{opacity:0;transform:translateX(-50%) scale(.86);animation:pop .5s cubic-bezier(.22,.9,.3,1.2) .15s forwards}
    .head{opacity:0;transform:translateY(14px) scale(.97);animation:pop2 .55s cubic-bezier(.22,.9,.3,1.2) .15s forwards}
    .cta{opacity:0;transform:translateY(16px);animation:rise .5s ease .6s forwards}
  }
  @keyframes pop{to{opacity:1;transform:translateX(-50%) scale(1)}}
  @keyframes pop2{to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div data-brand="hd">
  <div class="ad">
    <div class="hero">
      <div class="photo"></div>
      <span class="tag">New Featured Brand</span>
    </div>
    <div class="foot">
      <h3 class="head"><span>Hydration,</span><em>Multiplied.</em></h3>
      <span class="cta">Shop Liquid I.V.</span>
    </div>
  </div>
</div>
</body>
</html>
