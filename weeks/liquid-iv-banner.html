<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="../">
<title>Liquid I.V. Launch Banner</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="brands/hydration-depot.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#d8e6f0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font-primary)}
  .stage{width:100vw;display:flex;align-items:center;justify-content:center;padding:40px 0}
  .scaler{width:1400px;transform-origin:top center}
  .wrap{width:1400px;height:275px;position:relative;overflow:hidden;border-radius:10px;box-shadow:0 12px 40px rgba(10,30,60,.22)}

  /* Full-bleed product image */
  .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 40%;z-index:0}

  /* Left gradient overlay */
  .left-fade{position:absolute;inset:0;z-index:1;background:linear-gradient(90deg,rgba(10,36,74,.96) 0%,rgba(10,36,74,.92) 32%,rgba(10,36,74,.5) 48%,rgba(10,36,74,0) 58%)}

  /* Right gradient overlay */
  .right-fade{position:absolute;inset:0;z-index:1;background:linear-gradient(270deg,rgba(10,36,74,.88) 0%,rgba(10,36,74,.72) 18%,rgba(10,36,74,.2) 36%,rgba(10,36,74,0) 48%)}

  /* Left content */
  .left{position:absolute;left:0;top:0;bottom:0;width:38%;z-index:3;display:flex;flex-direction:column;justify-content:center;padding:0 40px 0 44px}
  .pill-tag{display:inline-flex;align-items:center;gap:7px;border:1.5px solid rgba(255,255,255,.55);border-radius:999px;padding:5px 14px 4px;width:fit-content;margin-bottom:10px;white-space:nowrap}
  .pill-tag span{font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:rgba(255,255,255,.9)}
  .pill-tag::before{content:"+";font-weight:700;color:rgba(255,255,255,.7);font-size:13px}
  .brand-name{font-family:var(--font-condensed);font-weight:900;text-transform:uppercase;font-size:54px;line-height:.92;letter-spacing:-.01em;color:#fff;margin:0;white-space:nowrap}
  .sub{font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:.22em;font-size:13px;color:rgba(255,255,255,.75);margin:6px 0 16px;white-space:nowrap}
  .shop-btn{display:inline-flex;align-items:center;justify-content:center;background:#0F60B2;color:#fff;font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:15px;padding:11px 28px;border-radius:999px;width:fit-content;border:0;white-space:nowrap}

  /* Right callout */
  .right{position:absolute;right:36px;top:50%;transform:translateY(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:10px}
  .callout-box{background:rgba(8,28,64,.78);border:1.5px solid rgba(255,255,255,.2);border-radius:12px;padding:14px 20px 10px;text-align:center;backdrop-filter:blur(6px);min-width:150px}
  .num{font-family:var(--font-condensed);font-weight:900;font-size:64px;line-height:.82;color:#fff;display:block}
  .callout-label{font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:rgba(255,255,255,.92);line-height:1.3;display:block;margin-top:6px}
  .hd-logo{height:22px;width:160px;background:var(--brand-logo-dark) no-repeat center/contain;opacity:.85}
</style>
</head>
<body>
<div class="stage">
<div class="scaler" id="scaler">
<div data-brand="hd">
  <div class="wrap">
    <img class="bg" src="assets/imagery/hd/liquid-iv-banner-ref.png" alt="">
    <div class="left-fade"></div>
    <div class="right-fade"></div>

    <!-- LEFT: Brand info -->
    <div class="left">
      <div class="pill-tag"><span>New Featured Brand</span></div>
      <h2 class="brand-name">Liquid I.V.</h2>
      <p class="sub">Hydration Multiplier</p>
      <button class="shop-btn">Shop Now</button>
    </div>

    <!-- RIGHT: Callout -->
    <div class="right">
      <div class="callout-box">
        <span class="num">2</span>
        <span class="callout-label">Sugar-Free<br>Flavor Options</span>
      </div>
      <div class="hd-logo"></div>
    </div>
    </div>
  </div>
</div>
</div>
</div>
<script>
  function scale(){
    const s=document.getElementById('scaler');
    const r=Math.min(1,(window.innerWidth-40)/1400);
    s.style.transform='scale('+r+')';
    s.style.marginBottom=(275*(r-1))+'px';
  }
  scale();window.addEventListener('resize',scale);
</script>
</body>
</html>
