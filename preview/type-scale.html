<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type Scale" subtitle="Display → label, size / weight" viewport="700x290" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--oes-white);padding:20px}
  .row{display:flex;align-items:baseline;gap:14px;padding:5px 0;border-bottom:1px solid var(--divider)}
  .row:last-child{border-bottom:0}
  .px{font-family:var(--font-condensed);font-size:11px;color:var(--fg-muted);width:74px;flex:none;letter-spacing:.03em}
  .spec{font-family:var(--font-primary);color:var(--fg-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head>
<body>
  <div class="row"><span class="px">88 / 900</span><span class="spec" style="font-family:var(--font-display);font-weight:700;font-size:30px">Display</span></div>
  <div class="row"><span class="px">64 / 900</span><span class="spec" style="font-weight:900;font-size:27px">Heading 1</span></div>
  <div class="row"><span class="px">44 / 700</span><span class="spec" style="font-weight:700;font-size:23px">Heading 2</span></div>
  <div class="row"><span class="px">32 / 700</span><span class="spec" style="font-weight:700;font-size:19px">Heading 3</span></div>
  <div class="row"><span class="px">24 / 500</span><span class="spec" style="font-weight:500;font-size:17px">Subhead</span></div>
  <div class="row"><span class="px">16 / 400</span><span class="spec" style="font-weight:400;font-size:15px">Body</span></div>
  <div class="row"><span class="px">12 / 700</span><span class="spec" style="font-family:var(--font-condensed);font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase">Label</span></div>
</body></html>
