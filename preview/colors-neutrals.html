<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Palette · Darks & Neutrals" subtitle="Navy, deeper dark, grays, body text" viewport="700x230" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-primary);background:var(--oes-white);padding:20px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
  .chip{height:54px}
  .meta{padding:8px 10px}
  .name{font-weight:var(--fw-bold);font-size:12.5px;color:var(--fg-strong)}
  .hex{font-family:var(--font-condensed);font-size:11px;color:var(--fg-muted);letter-spacing:.04em;margin-top:1px}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0A2737"></div><div class="meta"><div class="name">Deep Navy</div><div class="hex">#0A2737 · Hero BG</div></div></div>
    <div class="sw"><div class="chip" style="background:#10465B"></div><div class="meta"><div class="name">Deeper Dark</div><div class="hex">#10465B · Alt hero</div></div></div>
    <div class="sw"><div class="chip" style="background:#232323"></div><div class="meta"><div class="name">Near Black</div><div class="hex">#232323 · Body text</div></div></div>
    <div class="sw"><div class="chip" style="background:#5C6B77"></div><div class="meta"><div class="name">Muted</div><div class="hex">#5C6B77 · 2ndary text</div></div></div>
    <div class="sw"><div class="chip" style="background:#EEEEEE"></div><div class="meta"><div class="name">Light Gray</div><div class="hex">#EEEEEE · Dividers</div></div></div>
    <div class="sw"><div class="chip" style="background:#DDE3E8"></div><div class="meta"><div class="name">Divider</div><div class="hex">#DDE3E8 · Hairlines</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF;box-shadow:inset 0 0 0 1px #EEE"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF · BG</div></div></div>
    <div class="sw"><div class="chip" style="background:#214662"></div><div class="meta"><div class="name">Gradient mid</div><div class="hex">#214662 · Hero stop</div></div></div>
  </div>
</body></html>
