<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type · Labels & Tags" subtitle="Roboto Condensed Bold, wide tracking" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--oes-white);padding:22px;display:flex;gap:30px;align-items:center;flex-wrap:wrap}
  .label{font-family:var(--font-condensed);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase}
  .p{color:var(--oes-primary)}.m{color:var(--fg-muted)}.s{color:var(--oes-accent)}
  .chip{display:inline-block;font-family:var(--font-condensed);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:var(--oes-primary);padding:5px 12px;border-radius:var(--radius-pill)}
  .col{display:flex;flex-direction:column;gap:14px}
  .cap{font-family:var(--font-condensed);font-size:10px;color:var(--fg-muted);letter-spacing:.04em;margin-top:4px}
</style></head>
<body>
  <div class="col">
    <div class="label p">Brand Family</div>
    <div class="label m">Safety Supply</div>
    <div class="label s">A Family of Brands</div>
    <div class="cap">Roboto Condensed Bold · tracking 2–3px</div>
  </div>
  <div class="col">
    <span class="chip">Parent Company</span>
    <span class="cap">Tag / pill label</span>
  </div>
</body></html>
