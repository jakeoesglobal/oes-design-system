<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation / Shadows" subtitle="Soft cool-tinted shadows" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--oes-white);padding:28px;display:flex;gap:30px;align-items:center;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:110px;height:62px;background:#fff;border-radius:var(--radius-md)}
  .sm{box-shadow:var(--shadow-sm)}.md{box-shadow:var(--shadow-md)}.lg{box-shadow:var(--shadow-lg)}
  .n{font-family:var(--font-condensed);font-weight:700;font-size:11px;color:var(--fg-strong);letter-spacing:.04em}
</style></head>
<body>
  <div class="item"><div class="box sm"></div><div class="n">SHADOW · SM</div></div>
  <div class="item"><div class="box md"></div><div class="n">SHADOW · MD</div></div>
  <div class="item"><div class="box lg"></div><div class="n">SHADOW · LG</div></div>
</body></html>
