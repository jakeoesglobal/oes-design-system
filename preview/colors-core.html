<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Core Brand Colors" subtitle="Primary, accent (steel), mid" viewport="700x190" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-primary);background:var(--oes-white);padding:20px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
  .chip{height:80px}
  .meta{padding:10px 12px}
  .name{font-weight:var(--fw-bold);font-size:14px;color:var(--fg-strong)}
  .hex{font-family:var(--font-condensed);font-size:12px;color:var(--fg-muted);letter-spacing:.04em;margin-top:2px}
  .use{font-size:11px;color:var(--fg-muted);margin-top:4px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#305B7D"></div><div class="meta"><div class="name">Primary</div><div class="hex">#305B7D</div><div class="use">Primary actions, key UI, wordmark</div></div></div>
    <div class="sw"><div class="chip" style="background:#7C9CB6"></div><div class="meta"><div class="name">Accent · Steel</div><div class="hex">#7C9CB6</div><div class="use">Secondary accent, light bands</div></div></div>
    <div class="sw"><div class="chip" style="background:#314352"></div><div class="meta"><div class="name">Mid</div><div class="hex">#314352</div><div class="use">Secondary slate surfaces</div></div></div>
  </div>
</body></html>
