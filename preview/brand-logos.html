<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo Lockups" subtitle="Color / steel / white on correct backgrounds" viewport="700x170" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-primary);display:flex}
  .c{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:26px 16px;min-height:120px}
  .c img{width:170px;height:auto}
  .cap{font-family:var(--font-condensed);font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
  .on-light{background:#fff}.on-light .cap{color:var(--fg-muted)}
  .on-dark{background:#0A2737}.on-dark .cap{color:#B7C6D2}
  .on-primary{background:#305B7D}.on-primary .cap{color:#cfe0ec}
</style></head>
<body>
  <div class="c on-light"><img src="../assets/oes-logo-color.svg"><span class="cap">Color · on light</span></div>
  <div class="c on-dark"><img src="../assets/oes-logo-steel.svg"><span class="cap">Steel · on dark</span></div>
  <div class="c on-primary"><img src="../assets/oes-logo-white.svg"><span class="cap">White · on primary</span></div>
</body></html>
