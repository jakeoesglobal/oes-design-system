<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="8pt base grid, 4 → 96px" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--oes-white);padding:20px;display:flex;align-items:flex-end;gap:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--oes-accent);border-radius:3px;width:30px}
  .n{font-family:var(--font-condensed);font-size:10px;color:var(--fg-muted);letter-spacing:.03em}
  .v{font-family:var(--font-condensed);font-weight:700;font-size:11px;color:var(--fg-strong)}
</style></head>
<body>
  <div class="item"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="n">space-1</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="n">space-2</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="n">space-3</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="n">space-4</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="n">space-5</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="n">space-6</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="n">space-7</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="v">64</div><div class="n">space-8</div></div>
  <div class="item"><div class="bar" style="height:96px"></div><div class="v">96</div><div class="n">space-9</div></div>
</body></html>
