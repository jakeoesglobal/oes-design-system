<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Icon Mark" subtitle="Globe icon — color / steel / white" viewport="700x170" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-primary);display:flex}
  .c{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px 16px;min-height:120px}
  .c img{width:62px;height:auto}
  .cap{font-family:var(--font-condensed);font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
  .on-light{background:#fff}.on-light .cap{color:var(--fg-muted)}
  .on-dark{background:#10465B}.on-dark .cap{color:#B7C6D2}
  .on-primary{background:#305B7D}.on-primary .cap{color:#cfe0ec}
</style></head>
<body>
  <div class="c on-light"><img src="../assets/oes-icon-color.svg"><span class="cap">Icon · color</span></div>
  <div class="c on-dark"><img src="../assets/oes-icon-steel.svg"><span class="cap">Icon · steel</span></div>
  <div class="c on-primary"><img src="../assets/oes-icon-white.svg"><span class="cap">Icon · white</span></div>
</body></html>
