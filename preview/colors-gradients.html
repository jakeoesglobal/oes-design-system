<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Approved Gradients" subtitle="OES Deep / Deeper / Steel — hero & BG only" viewport="700x260" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-primary);background:var(--oes-white);padding:20px}
  .col{display:flex;flex-direction:column;gap:12px}
  .g{height:64px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:8px 12px;border:1px solid rgba(0,0,0,.05)}
  .lab{font-family:var(--font-condensed);font-weight:var(--fw-bold);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#fff}
  .stops{font-family:var(--font-condensed);font-size:10px;color:rgba(255,255,255,.8);margin-left:auto;letter-spacing:.03em}
</style></head>
<body>
  <div class="col">
    <div class="g" style="background:var(--grad-oes-deep)"><span class="lab">OES Deep</span><span class="stops">#000 → #0A2737 → #214662</span></div>
    <div class="g" style="background:var(--grad-oes-deeper)"><span class="lab">OES Deeper</span><span class="stops">#0A2737 → #10465B → #536C87</span></div>
    <div class="g" style="background:var(--grad-oes-steel)"><span class="lab">OES Steel</span><span class="stops">#10465B → #305B7D → #7B9CB6</span></div>
  </div>
</body></html>
